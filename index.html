<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Leptos Playground</title>
        <link data-trunk rel="rust" data-wasm-opt="0" data-keep-debug="true" />
        <link rel="stylesheet" href="https://unpkg.com/open-props" />

        <!-- optional imports that use the props -->
        <link
            rel="stylesheet"
            href="https://unpkg.com/open-props/normalize.min.css"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/open-props/buttons.min.css"
        />

        <style>
            h1,
            h2,
            h3,
            h4,
            h5,
            h6 {
                text-align: center;
            }

            p {
                margin: var(--size-2);
            }

            body > picture,
            button,
            p,
            progress {
                display: block;
                margin-left: auto;
                margin-right: auto;
                text-align: center;
            }

            img {
                max-width: 100%;
                margin: auto;
                background-color: darkslategrey;
                padding: 10px;
            }

            .image-container {
                display: flex;
                justify-content: center; /* Zentriert die Bilder horizontal */
                gap: 10px; /* Abstand zwischen den Bildern */
            }

            .image-container img {
                max-width: 200px; /* Maximale Breite der Bilder */
                height: auto; /* Automatische Höhe, um das Seitenverhältnis beizubehalten */
            }

            .red {
                color: red;
            }
        </style>
    </head>
    <body>
        <link data-trunk rel="copy-dir" href="static/images/" />
        <div class="image-container">
            <img src="/images/Differenzierer.svg" alt="Differenzierer" />
            <img src="/images/Integrierer.svg" alt="Differenzierer" />
        </div>

        </picture>
    </body>
</html>
